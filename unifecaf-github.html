<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniFECAF · Sales Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--red:#C8102E;--rd:#9a0c22;--rg:rgba(200,16,46,0.12);--black:#090909;--s1:#111;--s2:#171717;--s3:#1e1e1e;--border:rgba(255,255,255,0.07);--brd:rgba(200,16,46,0.32);--text:#EDEAE5;--muted:#6B6B6B;--dim:#3A3A3A;--green:#22c55e;--yellow:#f59e0b;--fd:'DM Serif Display',serif;--fu:'Syne',sans-serif;--fm:'DM Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--text);font-family:var(--fu);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:15px 28px;border-bottom:1px solid var(--border);background:rgba(9,9,9,.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px}
.bm{width:32px;height:32px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;color:#fff}
.bn{font-family:var(--fd);font-size:18px}
.bs{font-size:9px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-family:var(--fm)}
.npill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-family:var(--fm);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.ndot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.screen{display:none;flex:1;flex-direction:column;align-items:center;padding:40px 20px;gap:20px}
.screen.active{display:flex}
.hero{text-align:center;max-width:540px}
.htag{font-family:var(--fm);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--red);margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px}
.htag::before,.htag::after{content:'';width:24px;height:1px;background:var(--rd)}
.hh{font-family:var(--fd);font-size:clamp(32px,5vw,58px);line-height:1.06;letter-spacing:-.025em;margin-bottom:14px}
.hh em{font-style:italic;color:var(--red)}
.hp{color:var(--muted);font-size:14px;line-height:1.8;max-width:400px;margin:0 auto}
.cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:24px;width:255px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,var(--rg),transparent 60%);opacity:0;transition:opacity .25s}
.card:hover{border-color:var(--brd);transform:translateY(-4px);box-shadow:0 18px 50px rgba(200,16,46,.1)}
.card:hover::before{opacity:1}
.cico{width:44px;height:44px;background:var(--s2);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.ctag{font-family:var(--fm);font-size:9px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:5px}
.ctit{font-size:16px;font-weight:700;margin-bottom:5px}
.cdesc{font-size:12px;color:var(--muted);line-height:1.6}
.carr{position:absolute;bottom:18px;right:18px;width:24px;height:24px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;opacity:0;transform:scale(.5);transition:all .25s}
.card:hover .carr{opacity:1;transform:scale(1)}
.cfw{width:100%;max-width:640px;display:flex;flex-direction:column;gap:20px}
.back{font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--fm);transition:color .2s}
.back:hover{color:var(--text)}
.cfs{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px}
.lbl{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-family:var(--fm)}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:6px 13px;border-radius:100px;border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all .18s;color:var(--muted);background:var(--s1);font-family:var(--fu);user-select:none}
.pill:hover{border-color:var(--brd);color:var(--text)}
.pill.on{border-color:var(--red);background:rgba(200,16,46,.1);color:var(--text)}
.srow{display:flex;align-items:center;gap:10px}
.srow input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:var(--s3);border-radius:2px;outline:none}
.srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--red);cursor:pointer;border:2px solid #000;box-shadow:0 0 0 2px var(--rd)}
.sv{font-family:var(--fm);font-size:12px;color:var(--red);min-width:58px;text-align:right}
.slbs{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);font-family:var(--fm)}
.ta{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-family:var(--fm);font-size:12px;resize:vertical;min-height:60px;outline:none;transition:border-color .2s;line-height:1.6}
.ta:focus{border-color:var(--brd)}
.ta::placeholder{color:var(--dim)}
.brow{display:flex;gap:8px;flex-wrap:wrap}
.btnr{background:var(--red);color:#fff;border:none;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--fu);cursor:pointer;transition:opacity .18s}
.btnr:hover{opacity:.85}
.btng{background:var(--s2);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--fu);cursor:pointer}
.btng:hover{border-color:var(--brd)}
#s-chat{padding:0;align-items:stretch}
.cwrap{display:flex;flex-direction:column;height:calc(100vh - 63px)}
.cbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--s1);flex-shrink:0}
.cpers{display:flex;align-items:center;gap:8px}
.cav{width:32px;height:32px;border-radius:50%;background:#132213;display:flex;align-items:center;justify-content:center;font-size:15px;border:1.5px solid rgba(34,197,94,.25)}
.cn{font-weight:700
